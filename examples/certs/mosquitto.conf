# Mosquitto config for mTLS testing.
# Usage (from project root): docker run -d -p 1883:1883 -p 8883:8883 -v ./examples/certs:/certs:ro eclipse-mosquitto:2 sh -c 'mosquitto -c /certs/mosquitto.conf'
# Usage (native):            mosquitto -c examples/certs/mosquitto.conf -v

# Plain MQTT (no auth)
listener 1883
allow_anonymous true

# mTLS listener — paths are relative to this config file's directory
listener 8883
cafile ca.pem
certfile server.pem
keyfile server.key
require_certificate true
allow_anonymous true
